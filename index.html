<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinese Memory Pro</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available; /* Fix for mobile browser bars */
            overflow: hidden;
        }

        .screen { display: none; flex-direction: column; height: 100%; padding: 15px; }
        .active { display: flex; }

        /* --- SETUP SCREEN --- */
        #setup-screen { display: none; flex-direction: column; }
        #setup-screen.active { display: flex; }
        
        #setup-screen h2 { margin: 0 0 10px 0; color: var(--primary); flex-shrink: 0; }
        
        textarea {
            flex-grow: 1; /* Takes remaining space */
            background: var(--surface);
            color: var(--text);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            min-height: 100px;
        }

        .start-area { flex-shrink: 0; padding-bottom: 10px; }
        .btn-start { 
            background: var(--primary); 
            color: #000; 
            width: 100%; 
            font-size: 1.5rem; 
            font-weight: bold; 
            height: 70px; 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* --- PRACTICE SCREEN --- */
        #top-nav { display: flex; justify-content: space-between; align-items: center; height: 40px; flex-shrink: 0; margin-bottom: 5px; }
        .btn-small { background: #333; color: #888; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; border: none; }

        #main-tap-area {
            flex-grow: 1;
            background: var(--surface);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid #252525;
        }

        #pinyin-display { font-size: 2rem; color: var(--primary); font-weight: bold; margin-bottom: 5px; }
        #meaning-display { font-size: 1.1rem; opacity: 0.6; margin-bottom: 10px; }
        #char-display { font-size: 5rem; letter-spacing: 10px; min-height: 6rem; line-height: 1.2; }
        
        #example-display { 
            margin-top: 15px; 
            font-size: 0.95rem; 
            padding: 15px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 10px;
            display: none; 
            width: 100%;
        }

        /* --- BUTTON ZONE --- */
        .controls-area { flex-shrink: 0; padding: 15px 0; }
        
        .grading-bar { display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .active-grading { display: grid; }

        button.huge { 
            height: 140px; /* HUGE BUTTONS */
            font-size: 1.6rem; 
            font-weight: 900; 
            border: none; 
            border-radius: 20px; 
            text-transform: uppercase; 
        }
        .btn-correct { background: var(--secondary); color: #000; }
        .btn-wrong { background: var(--error); color: #000; }
        
        .btn-peace-toggle {
            background: #1a1a1a;
            color: #444;
            border: 1px solid #252525;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- PEACE MODE OVERRIDE --- */
        body.peace-active #top-nav,
        body.peace-active #main-tap-area,
        body.peace-active .grading-bar {
            opacity: 0;
            pointer-events: none;
        }
        
        body.peace-active .btn-peace-toggle {
            color: #666;
            border-color: #333;
            background: #111;
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen active">
        <h2>Input Word List</h2>
        <textarea id="input-data" placeholder="Paste your words here..."></textarea>
        <div class="start-area">
            <button class="btn-start" onclick="startPractice()">START SESSION</button>
        </div>
    </div>

    <!-- PRACTICE SCREEN -->
    <div id="practice-screen" class="screen">
        <div id="top-nav">
            <button class="btn-small" onclick="goBack()">← SETUP</button>
            <div id="stats" style="color: var(--secondary); font-weight: bold; font-family: monospace;">PHASE 1 | 0/10</div>
            <div style="width: 60px;"></div>
        </div>

        <div id="main-tap-area" onclick="handleTap()">
            <div id="pinyin-display"></div>
            <div id="meaning-display"></div>
            <div id="char-display"></div>
            
            <div id="example-display">
                <div id="ex-cn" style="font-size: 1.1rem; margin-bottom: 5px;"></div>
                <div id="ex-py" style="color:var(--primary); margin-bottom: 5px;"></div>
                <div id="ex-en" style="opacity:0.7; font-style: italic;"></div>
            </div>
        </div>

        <div class="controls-area">
            <div id="grading-bar" class="grading-bar">
                <button class="huge btn-wrong" onclick="grade(false)">WRONG</button>
                <button class="huge btn-correct" onclick="grade(true)">RIGHT</button>
            </div>
            
            <button id="peace-toggle-btn" class="btn-peace-toggle" onclick="togglePeace()">
                Peace Mode
            </button>
        </div>
    </div>

<script>
    let words = [];
    let currentWord = null;
    let revealIdx = 0;
    let phase = 1;

    function startPractice() {
        const text = document.getElementById('input-data').value.trim();
        if(!text) return alert("Please paste words first.");

        const blocks = text.split(/\n\s*\n/);
        words = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim());
            return {
                char: lines[0] || "",
                pinyin: lines[1] || "",
                meaning: lines[2] || "",
                exCn: lines[3] || "",
                exPy: lines[4] || "",
                exEn: lines[5] || "",
                count: 0
            };
        });

        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('practice-screen').classList.add('active');
        nextWord();
    }

    function goBack() {
        document.getElementById('setup-screen').classList.add('active');
        document.getElementById('practice-screen').classList.remove('active');
    }

    function nextWord() {
        let pool = [];
        if (phase === 1) {
            pool = words.filter(w => w.count < 5);
            if (pool.length === 0) { phase = 2; return nextWord(); }
        } else {
            pool = words.filter(w => w.count < 10);
            if (pool.length === 0) { alert("Session Complete!"); return goBack(); }
        }

        currentWord = pool[Math.floor(Math.random() * pool.length)];
        revealIdx = 0;
        
        document.getElementById('pinyin-display').innerText = currentWord.pinyin;
        document.getElementById('meaning-display').innerText = currentWord.meaning;
        document.getElementById('char-display').innerText = "";
        document.getElementById('ex-cn').innerText = currentWord.exCn;
        document.getElementById('ex-py').innerText = currentWord.exPy;
        document.getElementById('ex-en').innerText = currentWord.exEn;
        
        document.getElementById('grading-bar').classList.remove('active-grading');
        document.getElementById('example-display').style.display = 'none';
        updateStats();
    }

    function handleTap() {
        if(document.body.classList.contains('peace-active')) return;

        const cleanChars = Array.from(currentWord.char.replace(/[\s+]/g, ''));
        if (revealIdx < cleanChars.length) {
            document.getElementById('char-display').innerText += cleanChars[revealIdx];
            revealIdx++;
        }
        
        if (revealIdx === cleanChars.length) {
            document.getElementById('grading-bar').classList.add('active-grading');
            document.getElementById('example-display').style.display = 'block';
        }
    }

    function grade(isCorrect) {
        if(isCorrect) currentWord.count++;
        nextWord();
    }

    function updateStats() {
        document.getElementById('stats').innerText = `PHASE ${phase} | ${currentWord.count}/10`;
    }

    function togglePeace() {
        const isPeace = document.body.classList.toggle('peace-active');
        const btn = document.getElementById('peace-toggle-btn');
        btn.innerText = isPeace ? "Exit Peace Mode" : "Peace Mode";
    }
</script>
</body>
</html>
