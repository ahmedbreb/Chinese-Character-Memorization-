<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinese Memory Pro</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text: #e0e0e0;
            --peace-btn: #333333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .screen { display: none; flex-direction: column; height: 100%; padding: 15px; }
        .active { display: flex; }

        /* --- SETUP SCREEN --- */
        #setup-screen { justify-content: space-between; }
        #setup-screen h2 { margin: 0 0 10px 0; color: var(--primary); }
        textarea {
            flex: 1;
            background: var(--surface);
            color: var(--text);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }
        .start-area { height: 80px; }

        /* --- PRACTICE SCREEN --- */
        #top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; height: 40px; }
        .btn-small { background: #333; color: #888; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; border: none; }

        #main-tap-area {
            flex: 1;
            background: var(--surface);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            padding: 20px;
            overflow-y: auto;
        }

        #pinyin-display { font-size: 1.8rem; color: var(--primary); font-weight: bold; margin-bottom: 5px; }
        #meaning-display { font-size: 1rem; opacity: 0.6; margin-bottom: 15px; }
        #char-display { font-size: 4.5rem; letter-spacing: 8px; min-height: 5.5rem; }
        
        #example-display { 
            margin-top: 15px; 
            font-size: 0.85rem; 
            padding: 12px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 10px;
            display: none; /* Auto-shown on finish */
            width: 100%;
        }

        /* --- BUTTONS --- */
        .controls-area { padding-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .grading-bar { display: none; grid-template-columns: 1fr 1fr; gap: 12px; }
        .active-grading { display: grid; }

        button.huge { 
            height: 100px; /* Bigger buttons */
            font-size: 1.4rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 15px; 
            text-transform: uppercase; 
        }
        .btn-correct { background: var(--secondary); color: #000; }
        .btn-wrong { background: var(--error); color: #000; }
        
        .btn-start { background: var(--primary); color: #000; width: 100%; font-size: 1.4rem; font-weight: bold; height: 60px; border: none; border-radius: 15px; }

        /* PEACE MODE TOGGLE */
        .btn-peace-toggle {
            background: transparent;
            color: #333;
            border: 1px solid #222;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- PEACE MODE STATE --- */
        body.peace-active #top-nav,
        body.peace-active #main-tap-area,
        body.peace-active .grading-bar {
            visibility: hidden;
            pointer-events: none;
        }
        
        /* Keep the toggle button visible and interactive during peace mode */
        body.peace-active .btn-peace-toggle {
            visibility: visible !important;
            pointer-events: auto !important;
            border-color: #333;
            color: #555;
            margin-top: -100px; /* Pull it up slightly in the void */
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen active">
        <h2>Vocabulary Input</h2>
        <textarea id="input-data" placeholder="Paste your list here (Word, Pinyin, Meaning, Sentence...)"></textarea>
        <div class="start-area">
            <button class="btn-start" onclick="startPractice()">Start Session</button>
        </div>
    </div>

    <!-- PRACTICE SCREEN -->
    <div id="practice-screen" class="screen">
        <div id="top-nav">
            <button class="btn-small" onclick="goBack()">← Setup</button>
            <div id="stats" style="color: var(--secondary); font-weight: bold;">Phase 1 | 0/10</div>
            <div style="width: 60px;"></div> <!-- Spacer -->
        </div>

        <div id="main-tap-area" onclick="handleTap()">
            <div id="pinyin-display"></div>
            <div id="meaning-display"></div>
            <div id="char-display"></div>
            
            <div id="example-display">
                <div id="ex-cn"></div>
                <div id="ex-py" style="color:var(--primary); margin: 4px 0;"></div>
                <div id="ex-en" style="opacity:0.7"></div>
            </div>
        </div>

        <div class="controls-area">
            <div id="grading-bar" class="grading-bar">
                <button class="huge btn-wrong" onclick="grade(false)">Wrong</button>
                <button class="huge btn-correct" onclick="grade(true)">Correct</button>
            </div>
            
            <button id="peace-toggle-btn" class="btn-peace-toggle" onclick="togglePeace()">
                Peace Mode
            </button>
        </div>
    </div>

<script>
    let words = [];
    let currentWord = null;
    let revealIdx = 0;
    let phase = 1;

    function startPractice() {
        const text = document.getElementById('input-data').value.trim();
        if(!text) return alert("Paste words first!");

        const blocks = text.split(/\n\s*\n/);
        words = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim());
            return {
                char: lines[0],
                pinyin: lines[1],
                meaning: lines[2],
                exCn: lines[3],
                exPy: lines[4],
                exEn: lines[5],
                count: 0
            };
        });

        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('practice-screen').classList.add('active');
        nextWord();
    }

    function goBack() {
        document.getElementById('setup-screen').classList.add('active');
        document.getElementById('practice-screen').classList.remove('active');
    }

    function nextWord() {
        let pool = [];
        if (phase === 1) {
            pool = words.filter(w => w.count < 5);
            if (pool.length === 0) { phase = 2; return nextWord(); }
        } else {
            pool = words.filter(w => w.count < 10);
            if (pool.length === 0) { alert("Session Done!"); return goBack(); }
        }

        currentWord = pool[Math.floor(Math.random() * pool.length)];
        revealIdx = 0;
        
        document.getElementById('pinyin-display').innerText = currentWord.pinyin;
        document.getElementById('meaning-display').innerText = currentWord.meaning;
        document.getElementById('char-display').innerText = "";
        document.getElementById('ex-cn').innerText = currentWord.exCn;
        document.getElementById('ex-py').innerText = currentWord.exPy;
        document.getElementById('ex-en').innerText = currentWord.exEn;
        
        document.getElementById('grading-bar').classList.remove('active-grading');
        document.getElementById('example-display').style.display = 'none';
        updateStats();
    }

    function handleTap() {
        // Don't allow taps if peace mode is active (to prevent accidental reveals)
        if(document.body.classList.contains('peace-active')) return;

        const cleanChars = Array.from(currentWord.char.replace(/[\s+]/g, ''));
        if (revealIdx < cleanChars.length) {
            document.getElementById('char-display').innerText += cleanChars[revealIdx];
            revealIdx++;
        }
        
        if (revealIdx === cleanChars.length) {
            document.getElementById('grading-bar').classList.add('active-grading');
            document.getElementById('example-display').style.display = 'block';
        }
    }

    function grade(isCorrect) {
        if(isCorrect) currentWord.count++;
        nextWord();
    }

    function updateStats() {
        document.getElementById('stats').innerText = `Phase ${phase} | ${currentWord.count}/10`;
    }

    function togglePeace() {
        const isPeace = document.body.classList.toggle('peace-active');
        const btn = document.getElementById('peace-toggle-btn');
        btn.innerText = isPeace ? "Exit Peace Mode" : "Peace Mode";
    }
</script>
</body>
</html>
