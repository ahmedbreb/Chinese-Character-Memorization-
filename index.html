<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chinese Memory Pro</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 15px; position: relative; }
        .active { display: flex; }

        /* --- SETUP SCREEN --- */
        #setup-screen { justify-content: flex-start; }
        
        .setup-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .btn-clear {
            background: #333;
            color: var(--error);
            border: 1px solid rgba(207, 102, 121, 0.2);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-clear:active {
            background: rgba(207, 102, 121, 0.1);
        }

        textarea {
            width: 100%;
            flex: 1;
            background: var(--surface);
            color: var(--text);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.1rem;
            margin-bottom: 12px;
            outline: none;
            resize: none;
        }
        .btn-start { 
            height: 60px;
            background: var(--primary); 
            color: #000; 
            width: 100%; 
            font-size: 1.4rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 15px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        /* --- PRACTICE SCREEN --- */
        #top-nav { display: flex; justify-content: space-between; align-items: center; height: 45px; z-index: 10; }
        .btn-small { background: #333; color: #888; padding: 8px 14px; border-radius: 8px; border: none; font-size: 0.85rem; }

        #main-tap-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1;
            width: 100%;
        }

        #pinyin-display { font-size: 2.2rem; color: var(--primary); font-weight: bold; margin-bottom: 5px; }
        #meaning-display { font-size: 1.2rem; opacity: 0.6; margin-bottom: 15px; }
        #char-display { font-size: 6.5rem; letter-spacing: 8px; min-height: 7.5rem; line-height: 1; }
        
        #example-display { 
            margin-top: 15px; 
            padding: 15px; 
            background: rgba(0,0,0,0.5); 
            border-radius: 12px;
            display: none; 
            width: 100%;
            text-align: left;
        }

        #controls-container {
            width: 100%;
            padding-bottom: 80px; 
            z-index: 5;
            pointer-events: none;
        }
        
        .grading-bar { display: none; grid-template-columns: 1fr 1fr; gap: 15px; pointer-events: auto; }
        .active-grading { display: grid; }

        button.huge { height: 120px; font-size: 1.8rem; font-weight: 900; border: none; border-radius: 20px; }
        .btn-correct { background: var(--secondary); color: #000; }
        .btn-wrong { background: var(--error); color: #000; }
        
        #peace-toggle-btn {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: transparent;
            border: none;
            width: 60px;
            height: 60px;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0.15; 
            cursor: pointer;
        }

        body.peace-active #top-nav,
        body.peace-active #pinyin-display,
        body.peace-active #meaning-display,
        body.peace-active #char-display,
        body.peace-active #example-display,
        body.peace-active #controls-container {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen active">
        <div class="setup-header-row">
            <h2 style="margin:0; color: var(--text);">Vocabulary Input</h2>
            <button class="btn-clear" onclick="clearText()">CLEAR TEXT</button>
        </div>
        <textarea id="input-data" placeholder="Paste your words here..."></textarea>
        <button class="btn-start" onclick="startPractice()">START SESSION</button>
    </div>

    <!-- PRACTICE SCREEN -->
    <div id="practice-screen" class="screen">
        <div id="top-nav">
            <button class="btn-small" onclick="goBack()">← SETUP</button>
            <div id="stats" style="color: var(--secondary); font-weight: bold; font-family: monospace;">PHASE 1 | 0/10</div>
            <div style="width: 70px;"></div>
        </div>

        <div id="main-tap-area">
            <div id="pinyin-display"></div>
            <div id="meaning-display"></div>
            <div id="char-display"></div>
            
            <div id="example-display">
                <div id="ex-cn" style="font-size: 1.2rem; margin-bottom: 5px; font-weight:bold; color:white;"></div>
                <div id="ex-py" style="color:var(--primary); margin-bottom: 5px; font-style: italic;"></div>
                <div id="ex-en" style="opacity:0.8; font-size: 0.9rem;"></div>
            </div>
        </div>

        <div id="controls-container">
            <div id="grading-bar" class="grading-bar">
                <button class="huge btn-wrong" onclick="grade(false); event.stopPropagation();">WRONG</button>
                <button class="huge btn-correct" onclick="grade(true); event.stopPropagation();">RIGHT</button>
            </div>
        </div>
        
        <div id="peace-toggle-btn" onclick="togglePeace(); event.stopPropagation();">👁️</div>
    </div>

<script>
    let words = [];
    let currentWord = null;
    let revealIdx = 0;
    let phase = 1;
    let finalRevealReady = false;

    function clearText() {
        document.getElementById('input-data').value = "";
        document.getElementById('input-data').focus();
    }

    function startPractice() {
        const text = document.getElementById('input-data').value.trim();
        if(!text) return alert("Paste words first!");
        const blocks = text.split(/\n\s*\n/);
        words = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim());
            return {
                char: lines[0] || "",
                pinyin: lines[1] || "",
                meaning: lines[2] || "",
                exCn: lines[3] || "",
                exPy: lines[4] || "",
                exEn: lines[5] || "",
                count: 0
            };
        });
        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('practice-screen').classList.add('active');
        nextWord();
    }

    function goBack() {
        document.getElementById('setup-screen').classList.add('active');
        document.getElementById('practice-screen').classList.remove('active');
    }

    function nextWord() {
        let pool = (phase === 1) ? words.filter(w => w.count < 5) : words.filter(w => w.count < 10);
        if (pool.length === 0) {
            if(phase === 1) { phase = 2; return nextWord(); }
            alert("Session Complete!"); return goBack();
        }

        currentWord = pool[Math.floor(Math.random() * pool.length)];
        revealIdx = 0;
        finalRevealReady = false;
        
        document.getElementById('char-display').innerText = "";
        document.getElementById('pinyin-display').innerText = currentWord.pinyin;
        document.getElementById('meaning-display').innerText = currentWord.meaning;
        document.getElementById('ex-cn').innerText = currentWord.exCn;
        document.getElementById('ex-py').innerText = currentWord.exPy;
        document.getElementById('ex-en').innerText = currentWord.exEn;
        
        document.getElementById('grading-bar').classList.remove('active-grading');
        document.getElementById('example-display').style.display = 'none';
        updateStats();
    }

    function handleGlobalClick(e) {
        if (!document.getElementById('practice-screen').classList.contains('active')) return;
        if (document.body.classList.contains('peace-active')) return;

        const cleanChars = Array.from(currentWord.char.replace(/[\s+]/g, ''));
        
        if (revealIdx < cleanChars.length) {
            document.getElementById('char-display').innerText += cleanChars[revealIdx];
            revealIdx++;
            if (revealIdx === cleanChars.length) {
                finalRevealReady = true;
            }
        } 
        else if (finalRevealReady) {
            document.getElementById('grading-bar').classList.add('active-grading');
            document.getElementById('example-display').style.display = 'block';
            finalRevealReady = false; 
        }
    }

    function grade(isCorrect) {
        if(isCorrect) currentWord.count++;
        nextWord();
    }

    function updateStats() {
        document.getElementById('stats').innerText = `PHASE ${phase} | ${currentWord.count}/10`;
    }

    function togglePeace() {
        const isPeace = document.body.classList.toggle('peace-active');
        document.getElementById('peace-toggle-btn').innerText = isPeace ? "🙈" : "👁️";
    }
</script>
</body>
</html>
