<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinese Memory Pro</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 15px; position: relative; }
        .active { display: flex; }

        /* --- SETUP SCREEN --- */
        #setup-screen { justify-content: flex-start; }
        textarea {
            flex: 1; /* Grows to take almost all space */
            background: var(--surface);
            color: var(--text);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.1rem;
            margin-bottom: 10px;
            outline: none;
            width: 100%;
        }
        .btn-start { 
            height: 60px;
            background: var(--primary); 
            color: #000; 
            width: 100%; 
            font-size: 1.3rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 12px;
            flex-shrink: 0;
        }

        /* --- PRACTICE SCREEN --- */
        #top-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 40px; 
            z-index: 10; /* Above the tap area */
            pointer-events: none; 
        }
        #top-nav * { pointer-events: auto; }

        .btn-small { background: #333; color: #888; padding: 8px 12px; border-radius: 6px; border: none; font-size: 0.8rem; }

        /* THE TAP AREA - NOW COVERS EVERYTHING */
        #main-tap-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
            cursor: pointer;
        }

        #pinyin-display { font-size: 2.2rem; color: var(--primary); font-weight: bold; margin-bottom: 5px; }
        #meaning-display { font-size: 1.2rem; opacity: 0.6; margin-bottom: 15px; }
        #char-display { font-size: 5rem; letter-spacing: 10px; min-height: 6rem; }
        
        #example-display { 
            margin-top: 20px; 
            padding: 15px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 12px;
            display: none; 
            width: 90%;
            pointer-events: none;
        }

        /* --- CONTROLS --- */
        #controls-container {
            position: absolute;
            bottom: 60px; /* Leave space for the eye */
            left: 15px;
            right: 15px;
            z-index: 5;
            pointer-events: none; /* Let taps pass through to background */
        }
        
        .grading-bar { 
            display: none; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            pointer-events: auto; /* Buttons need to be clickable */
        }
        .active-grading { display: grid; }

        button.huge { 
            height: 140px; 
            font-size: 1.8rem; 
            font-weight: 900; 
            border: none; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .btn-correct { background: var(--secondary); color: #000; }
        .btn-wrong { background: var(--error); color: #000; }
        
        /* THE EYE - PERMANENT BOTTOM */
        #peace-toggle-btn {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: transparent;
            border: none;
            font-size: 1.5rem; /* Normal size */
            cursor: pointer;
            z-index: 20;
            opacity: 0.5;
        }

        /* --- PEACE MODE STATE --- */
        body.peace-active #top-nav,
        body.peace-active #pinyin-display,
        body.peace-active #meaning-display,
        body.peace-active #char-display,
        body.peace-active #example-display,
        body.peace-active #controls-container {
            visibility: hidden !important;
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen active">
        <h2 style="color:var(--primary); margin:0 0 10px 0;">Input Words</h2>
        <textarea id="input-data" placeholder="Paste your Chinese words here..."></textarea>
        <button class="btn-start" onclick="startPractice()">START SESSION</button>
    </div>

    <!-- PRACTICE SCREEN -->
    <div id="practice-screen" class="screen">
        <div id="top-nav">
            <button class="btn-small" onclick="goBack()">← SETUP</button>
            <div id="stats" style="color: var(--secondary); font-weight: bold; pointer-events: none;">PHASE 1 | 0/10</div>
            <div style="width: 60px;"></div>
        </div>

        <!-- This covers the whole screen -->
        <div id="main-tap-area" onclick="handleTap()">
            <div id="pinyin-display"></div>
            <div id="meaning-display"></div>
            <div id="char-display"></div>
            
            <div id="example-display">
                <div id="ex-cn" style="font-size: 1.1rem; margin-bottom: 5px;"></div>
                <div id="ex-py" style="color:var(--primary); margin-bottom: 5px;"></div>
                <div id="ex-en" style="opacity:0.7;"></div>
            </div>
        </div>

        <div id="controls-container">
            <div id="grading-bar" class="grading-bar">
                <button class="huge btn-wrong" onclick="grade(false)">WRONG</button>
                <button class="huge btn-correct" onclick="grade(true)">RIGHT</button>
            </div>
        </div>
        
        <button id="peace-toggle-btn" onclick="togglePeace()">👁️</button>
    </div>

<script>
    let words = [];
    let currentWord = null;
    let revealIdx = 0;
    let phase = 1;

    function startPractice() {
        const text = document.getElementById('input-data').value.trim();
        if(!text) return alert("Please paste words first.");

        const blocks = text.split(/\n\s*\n/);
        words = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim());
            return {
                char: lines[0] || "",
                pinyin: lines[1] || "",
                meaning: lines[2] || "",
                exCn: lines[3] || "",
                exPy: lines[4] || "",
                exEn: lines[5] || "",
                count: 0
            };
        });

        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('practice-screen').classList.add('active');
        nextWord();
    }

    function goBack() {
        document.getElementById('setup-screen').classList.add('active');
        document.getElementById('practice-screen').classList.remove('active');
    }

    function nextWord() {
        let pool = [];
        if (phase === 1) {
            pool = words.filter(w => w.count < 5);
            if (pool.length === 0) { phase = 2; return nextWord(); }
        } else {
            pool = words.filter(w => w.count < 10);
            if (pool.length === 0) { alert("Session Complete!"); return goBack(); }
        }

        currentWord = pool[Math.floor(Math.random() * pool.length)];
        revealIdx = 0;
        
        document.getElementById('pinyin-display').innerText = currentWord.pinyin;
        document.getElementById('meaning-display').innerText = currentWord.meaning;
        document.getElementById('char-display').innerText = "";
        document.getElementById('ex-cn').innerText = currentWord.exCn;
        document.getElementById('ex-py').innerText = currentWord.exPy;
        document.getElementById('ex-en').innerText = currentWord.exEn;
        
        document.getElementById('grading-bar').classList.remove('active-grading');
        document.getElementById('example-display').style.display = 'none';
        updateStats();
    }

    function handleTap() {
        // We use Array.from to handle multi-character strings correctly
        const cleanChars = Array.from(currentWord.char.replace(/[\s+]/g, ''));
        if (revealIdx < cleanChars.length) {
            document.getElementById('char-display').innerText += cleanChars[revealIdx];
            revealIdx++;
        }
        
        if (revealIdx === cleanChars.length) {
            document.getElementById('grading-bar').classList.add('active-grading');
            document.getElementById('example-display').style.display = 'block';
        }
    }

    function grade(isCorrect) {
        if(isCorrect) currentWord.count++;
        nextWord();
    }

    function updateStats() {
        document.getElementById('stats').innerText = `PHASE ${phase} | ${currentWord.count}/10`;
    }

    function togglePeace() {
        const isPeace = document.body.classList.toggle('peace-active');
        const btn = document.getElementById('peace-toggle-btn');
        btn.innerText = isPeace ? "🙈" : "👁️";
    }
</script>
</body>
</html>
