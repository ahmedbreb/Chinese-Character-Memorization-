<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinese Memory Pro</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; }
        .active { display: flex; }

        /* --- SETUP SCREEN --- */
        #setup-screen h2 { margin: 0 0 10px 0; color: var(--primary); }
        textarea {
            flex: 1;
            background: var(--surface);
            color: var(--text);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
        }
        textarea:focus { border-color: var(--primary); }

        /* --- PRACTICE SCREEN --- */
        #top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-small { background: #333; color: #ccc; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; border: none; }

        #main-tap-area {
            flex: 1;
            background: var(--surface);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            position: relative;
            padding: 20px;
        }

        #pinyin-display { font-size: 2rem; color: var(--primary); font-weight: bold; }
        #meaning-display { font-size: 1.1rem; opacity: 0.6; margin-bottom: 20px; }
        #char-display { font-size: 5rem; letter-spacing: 10px; min-height: 6rem; }
        
        #example-display { 
            margin-top: 20px; 
            font-size: 0.9rem; 
            padding: 15px; 
            background: rgba(0,0,0,0.3); 
            border-radius: 10px;
            display: none;
        }

        /* --- HUGE BUTTONS --- */
        .grading-footer { display: none; grid-template-columns: 1fr 1fr; gap: 15px; padding-top: 20px; height: 120px; }
        .active-grading { display: grid; }

        button.huge { font-size: 1.2rem; font-weight: bold; border: none; border-radius: 15px; text-transform: uppercase; }
        .btn-correct { background: var(--secondary); color: #000; }
        .btn-wrong { background: var(--error); color: #000; }
        .btn-start { background: var(--primary); color: #000; padding: 20px; font-size: 1.5rem; }

        /* --- PEACE MODE --- */
        .peace-mode #pinyin-display, 
        .peace-mode #meaning-display, 
        .peace-mode #char-display, 
        .peace-mode #example-display,
        .peace-mode #top-nav { visibility: hidden; }
        
        #peace-btn { z-index: 100; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen active">
        <h2>Vocabulary Input</h2>
        <textarea id="input-data" placeholder="Paste your Chinese words here..."></textarea>
        <button class="huge btn-start" onclick="startPractice()">Start Session</button>
    </div>

    <!-- PRACTICE SCREEN -->
    <div id="practice-screen" class="screen">
        <div id="top-nav">
            <button class="btn-small" onclick="goBack()">← Setup</button>
            <div id="stats" style="font-size: 0.8rem; color: var(--secondary);">Phase 1 | 0/10</div>
            <button id="peace-btn" class="btn-small" onclick="togglePeace()">Peace Mode</button>
        </div>

        <div id="main-tap-area" onclick="handleTap()">
            <div id="pinyin-display"></div>
            <div id="meaning-display"></div>
            <div id="char-display"></div>
            
            <div id="example-display">
                <div id="ex-cn"></div>
                <div id="ex-py" style="color:var(--primary)"></div>
                <div id="ex-en" style="opacity:0.7"></div>
            </div>

            <div id="tap-hint" style="position:absolute; bottom:10px; font-size:0.7rem; opacity:0.3;">TAP SCREEN TO REVEAL</div>
        </div>

        <div id="grading-bar" class="grading-footer">
            <button class="huge btn-wrong" onclick="grade(false)">Wrong</button>
            <button class="huge btn-correct" onclick="grade(true)">Correct</button>
        </div>

        <button id="ex-toggle" class="btn-small" style="margin-top:10px; width:100%;" onclick="toggleExample()">Show/Hide Example</button>
    </div>

<script>
    let words = [];
    let currentWord = null;
    let revealIdx = 0;
    let phase = 1;

    function startPractice() {
        const text = document.getElementById('input-data').value.trim();
        if(!text) return alert("Paste words first!");

        const blocks = text.split(/\n\s*\n/);
        words = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim());
            return {
                char: lines[0],
                pinyin: lines[1],
                meaning: lines[2],
                exCn: lines[3],
                exPy: lines[4],
                exEn: lines[5],
                count: 0
            };
        });

        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('practice-screen').classList.add('active');
        nextWord();
    }

    function goBack() {
        document.getElementById('setup-screen').classList.add('active');
        document.getElementById('practice-screen').classList.remove('active');
    }

    function nextWord() {
        let pool = [];
        if (phase === 1) {
            pool = words.filter(w => w.count < 5);
            if (pool.length === 0) { phase = 2; return nextWord(); }
        } else {
            pool = words.filter(w => w.count < 10);
            if (pool.length === 0) { alert("Session Done!"); return goBack(); }
        }

        currentWord = pool[Math.floor(Math.random() * pool.length)];
        revealIdx = 0;
        
        document.getElementById('pinyin-display').innerText = currentWord.pinyin;
        document.getElementById('meaning-display').innerText = currentWord.meaning;
        document.getElementById('char-display').innerText = "";
        document.getElementById('ex-cn').innerText = currentWord.exCn;
        document.getElementById('ex-py').innerText = currentWord.exPy;
        document.getElementById('ex-en').innerText = currentWord.exEn;
        
        document.getElementById('grading-bar').classList.remove('active-grading');
        document.getElementById('example-display').style.display = 'none';
        document.getElementById('tap-hint').style.display = 'block';
        updateStats();
    }

    function handleTap() {
        const cleanChars = Array.from(currentWord.char.replace(/[\s+]/g, ''));
        if (revealIdx < cleanChars.length) {
            document.getElementById('char-display').innerText += cleanChars[revealIdx];
            revealIdx++;
        }
        
        if (revealIdx === cleanChars.length) {
            document.getElementById('grading-bar').classList.add('active-grading');
            document.getElementById('tap-hint').style.display = 'none';
        }
    }

    function grade(isCorrect) {
        if(isCorrect) currentWord.count++;
        nextWord();
    }

    function updateStats() {
        document.getElementById('stats').innerText = `Phase ${phase} | ${currentWord.count}/10`;
    }

    function toggleExample() {
        const el = document.getElementById('example-display');
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    function togglePeace() {
        document.body.classList.toggle('peace-mode');
        const btn = document.getElementById('peace-btn');
        btn.innerText = document.body.classList.contains('peace-mode') ? "EXIT PEACE" : "PEACE MODE";
    }
</script>
</body>
</html>
