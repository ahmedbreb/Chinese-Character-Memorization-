<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinese Writer Pro</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
        }

        /* --- SCREEN MANAGEMENT --- */
        .screen { display: none; flex-direction: column; height: 100%; padding: 15px; }
        .screen.active { display: flex; }

        /* --- SETUP SCREEN --- */
        h2 { margin-top: 0; color: var(--primary); }
        textarea {
            flex: 1;
            background: var(--surface);
            color: var(--text);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            resize: none;
            margin-bottom: 15px;
        }

        /* --- PRACTICE SCREEN --- */
        #stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        #display-box {
            background: var(--surface);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .peace-mode #display-box { opacity: 0; }

        #pinyin-prompt { font-size: 1.4rem; font-weight: bold; color: var(--primary); }
        #meaning-prompt { font-size: 0.9rem; opacity: 0.7; margin-bottom: 10px; }
        #char-display { font-size: 3.5rem; height: 4.5rem; letter-spacing: 5px; }

        #example-box {
            margin-top: 10px;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 5px;
            display: none;
        }

        /* --- CANVAS --- */
        #canvas-wrap {
            flex: 1;
            margin: 15px 0;
            background: #252525;
            border: 2px solid #333;
            border-radius: 10px;
            position: relative;
            touch-action: none;
        }
        canvas { width: 100%; height: 100%; touch-action: none; }

        /* --- CONTROLS --- */
        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding-bottom: 10px;
        }

        button {
            padding: 12px 5px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-p { background: var(--primary); color: #000; }
        .btn-s { background: #444; color: #fff; }
        .btn-ok { background: var(--secondary); color: #000; }
        .btn-no { background: var(--error); color: #000; }
        .wide { grid-column: span 2; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen active">
        <h2>Input Word List</h2>
        <p style="font-size: 0.8rem; opacity: 0.7;">Paste your words below (6 lines per word block):</p>
        <textarea id="input-data" placeholder="问候&#10;wènhòu&#10;to greet&#10;他 问候 邻居&#10;Tā wènhòu línjū&#10;He greets neighbors"></textarea>
        <button class="btn-p wide" onclick="startApp()">Start Memorizing</button>
    </div>

    <!-- PRACTICE SCREEN -->
    <div id="practice-screen" class="screen">
        <div id="stats-bar">
            <span id="stat-phase">Phase: 1/2</span>
            <span id="stat-count">Word Progress: 0/10</span>
        </div>

        <div id="display-box">
            <div id="pinyin-prompt">pīnyīn</div>
            <div id="meaning-prompt">meaning</div>
            <div id="char-display"></div>
            <div id="example-box">
                <div id="ex-cn"></div>
                <div id="ex-py" style="color:var(--primary)"></div>
                <div id="ex-en" style="opacity:0.7"></div>
            </div>
        </div>

        <div id="canvas-wrap">
            <canvas id="paintCanvas"></canvas>
        </div>

        <div class="controls">
            <button class="btn-s" onclick="togglePeace()">Peace Mode</button>
            <button class="btn-s" onclick="toggleExample()">Example</button>
            
            <button id="btn-reveal" class="btn-p wide" onclick="handleReveal()">Reveal Next Character</button>
            
            <button id="btn-wrong" class="btn-no hidden" onclick="handleGrade(false)">Wrong</button>
            <button id="btn-correct" class="btn-ok hidden" onclick="handleGrade(true)">Correct</button>
            
            <button class="btn-s wide" onclick="clearCanvas()">Clear Writing</button>
        </div>
    </div>

<script>
    let words = [];
    let currentWord = null;
    let revealIdx = 0;
    let phase = 1;

    // --- NAVIGATION ---
    function startApp() {
        const text = document.getElementById('input-data').value.trim();
        if(!text) return alert("Please paste some words first!");
        
        const blocks = text.split(/\n\s*\n/);
        words = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim());
            return {
                char: lines[0],
                pinyin: lines[1],
                meaning: lines[2],
                exCn: lines[3],
                exPy: lines[4],
                exEn: lines[5],
                count: 0
            };
        });

        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('practice-screen').classList.add('active');
        resizeCanvas();
        nextWord();
    }

    // --- LOGIC ---
    function nextWord() {
        let pool = [];
        if (phase === 1) {
            pool = words.filter(w => w.count < 5);
            if (pool.length === 0) { phase = 2; return nextWord(); }
        } else {
            pool = words.filter(w => w.count < 10);
            if (pool.length === 0) {
                alert("Session Complete!");
                location.reload();
                return;
            }
        }

        currentWord = pool[Math.floor(Math.random() * pool.length)];
        revealIdx = 0;
        
        // UI Reset
        document.getElementById('pinyin-prompt').innerText = currentWord.pinyin;
        document.getElementById('meaning-prompt').innerText = currentWord.meaning;
        document.getElementById('char-display').innerText = "";
        document.getElementById('ex-cn').innerText = currentWord.exCn;
        document.getElementById('ex-py').innerText = currentWord.exPy;
        document.getElementById('ex-en').innerText = currentWord.exEn;
        document.getElementById('example-box').style.display = "none";
        
        updateStats();
        toggleButtons(false);
        clearCanvas();
    }

    function handleReveal() {
        const cleanChars = Array.from(currentWord.char.replace(/[\s+]/g, ''));
        if (revealIdx < cleanChars.length) {
            document.getElementById('char-display').innerText += cleanChars[revealIdx];
            revealIdx++;
        }
        
        if (revealIdx === cleanChars.length) {
            toggleButtons(true);
        }
    }

    function handleGrade(isCorrect) {
        if(isCorrect) currentWord.count++;
        nextWord();
    }

    function toggleButtons(isFinished) {
        document.getElementById('btn-reveal').classList.toggle('hidden', isFinished);
        document.getElementById('btn-correct').classList.toggle('hidden', !isFinished);
        document.getElementById('btn-wrong').classList.toggle('hidden', !isFinished);
    }

    function updateStats() {
        document.getElementById('stat-phase').innerText = `Phase: ${phase}/2`;
        document.getElementById('stat-count').innerText = `Progress: ${currentWord.count}/10`;
    }

    function toggleExample() {
        const el = document.getElementById('example-box');
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    function togglePeace() {
        document.body.classList.toggle('peace-mode');
    }

    // --- CANVAS ---
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return [clientX - rect.left, clientY - rect.top];
    }

    function start(e) { drawing = true; const [x,y] = getPos(e); ctx.beginPath(); ctx.moveTo(x,y); }
    function move(e) { 
        if(!drawing) return; 
        const [x,y] = getPos(e); 
        ctx.lineTo(x,y); 
        ctx.stroke(); 
    }
    function stop() { drawing = false; }
    function clearCanvas() { ctx.clearRect(0,0,canvas.width, canvas.height); }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', move);
    canvas.addEventListener('touchend', stop);
    window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
